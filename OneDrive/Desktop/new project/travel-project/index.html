<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelEasy - Book Your Trip</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
<form id="bookingForm">
  <input type="text" name="name" placeholder="Name" required />
  <input type="email" name="email" placeholder="Email" required />
  <input type="text" name="phone" placeholder="Phone" required />
  <input type="text" name="destination" placeholder="Destination" required />
  <input type="date" name="date" required />
  <input type="number" name="travelers" placeholder="Travelers" required />
  <textarea name="requirements" placeholder="Requirements"></textarea>
  <button type="submit">Submit</button>
</form>

<script>
document.getElementById("bookingForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const formData = new FormData(this);

  const data = {
    name: formData.get("name"),
    email: formData.get("email"),
    phone: formData.get("phone"),
    destination: formData.get("destination"),
    date: formData.get("date"),
    travelers: formData.get("travelers"),
    requirements: formData.get("requirements")
  };

  try {
    const response = await fetch("https://travel-project-0rk9.onrender.com/api/bookings", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify(data)
});

// retry once if failed (server sleeping)
if (!response.ok) {
  await new Promise(res => setTimeout(res, 15000)); // wait 15 sec

  const retryResponse = await fetch("https://travel-project-0rk9.onrender.com/api/bookings", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  if (!retryResponse.ok) throw new Error("Server still not responding");

  alert("✅ Booking Successful!");
} else {
  alert("✅ Booking Successful!");
}

const mongoose = require("mongoose");

mongoose.connect(process.env.MONGO_URI)
.then(() => console.log("✅ MongoDB Connected"))
.catch(err => console.log("❌ Error:", err));

console.log("ENV TEST:", process.env.MONGO_URI);
  } catch (error) {
    alert("❌ Booking Failed: " + error.message);
  }
});
</script>
</body>
</html>
